<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume Builder</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px;
    background-color: #f4f4f4;
}

/* FORM */
form {
    max-width: 210mm;
    margin: auto;
    background: white;
    padding: 20px;
    border: 1px solid #ddd;
    margin-bottom: 20px;
}

input, textarea {
    width: 100%;
    padding: 8px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
}

button {
    padding: 10px;
    background: #2c3e50;
    color: white;
    border: none;
    cursor: pointer;
}

/* RESUME A4 FIX */
.resume {
    width: 210mm;
    min-height: 297mm;
    margin: auto;
    background: white;
    padding: 15mm;
    box-sizing: border-box;
    border: 3px solid #2c3e50;
    font-size: 13px;
    display: none;
}

/* HEADER */
.header {
    background: #2c3e50;
    color: white;
    text-align: center;
    padding: 10px;
    position: relative;
}

.header img {
    position: absolute;
    right: 10px;
    top: 10px;
    width: 85px;
    height: 85px;
    border-radius: 50%;
}

/* SECTIONS */
.section {
    margin-bottom: 8px;
    break-inside: avoid;
}

.section h3 {
    border-bottom: 2px solid #333;
    padding-bottom: 3px;
    margin-bottom: 5px;
}

ul {
    padding-left: 18px;
    margin: 5px 0;
    line-height: 1.4;
}

/* PROJECTS */
#resumeProjects {
    line-height: 1.4;
}

/* PRINT FIX (MOST IMPORTANT) */
@media print {

    body {
        background: white;
    }

    form {
        display: none;
    }

    .resume {
        border: none;
        width: 210mm;
        height: 297mm;
        padding: 15mm;
        overflow: hidden;
    }

    button {
        display: none;
    }

    .section {
        break-inside: avoid;
        page-break-inside: avoid;
    }

    h3 {
        break-after: avoid;
    }
}
</style>
</head>

<body>

<form id="resumeForm">

<h2>Resume Builder</h2>

<input type="text" id="name" placeholder="Full Name" required>
<input type="file" id="profilePicInput">

<input type="text" id="phone" placeholder="Phone">
<input type="email" id="email" placeholder="Email">
<input type="text" id="location" placeholder="Location">
<input type="text" id="linkedin" placeholder="LinkedIn">

<textarea id="objective" placeholder="Objective"></textarea>

<input type="text" id="skills" placeholder="Skills (comma separated)">
<input type="text" id="certifications" placeholder="Certifications (comma separated)">
<input type="text" id="education" placeholder="Education (single line)">
<input type="text" id="languages" placeholder="Languages (comma separated)">

<textarea id="experience" placeholder="Experience"></textarea>

<textarea id="projects" placeholder="Projects / Internships"></textarea>

<button type="submit">Generate Resume</button>

</form>

<div class="resume" id="resume">

<div class="header">
    <h1 id="resumeName"></h1>
    <img id="profilePic">
</div>

<div class="section">
<h3>CAREER OBJECTIVE</h3>
<p id="resumeObjective"></p>
</div>

<div class="section">
<h3>CONTACT</h3>
<p id="resumePhone"></p>
<p id="resumeEmail"></p>
<p id="resumeLocation"></p>
<p id="resumeLinkedin"></p>
</div>

<div class="section">
<h3>SKILLS</h3>
<ul id="resumeSkills"></ul>
</div>

<div class="section">
<h3>EDUCATION</h3>
<p id="resumeEducation"></p>
</div>

<div class="section">
<h3>CERTIFICATIONS</h3>
<ul id="resumeCertifications"></ul>
</div>

<div class="section">
<h3>LANGUAGES</h3>
<ul id="resumeLanguages"></ul>
</div>

<div class="section">
<h3>EXPERIENCE</h3>
<p id="resumeExperience"></p>
</div>

<div class="section">
<h3>PROJECTS / INTERNSHIPS</h3>
<div id="resumeProjects"></div>
</div>

<button onclick="window.print()">Download PDF</button>

</div>

<script>

/* IMAGE */
document.getElementById('profilePicInput').addEventListener('change', function(e){
    const reader = new FileReader();
    reader.onload = function(){
        document.getElementById('profilePic').src = reader.result;
    };
    reader.readAsDataURL(e.target.files[0]);
});

/* LISTS */
function makeList(id, target){
    const items = document.getElementById(id).value
        .split(',')
        .map(i => i.trim())
        .filter(Boolean);

    const ul = document.getElementById(target);
    ul.innerHTML = "";

    items.forEach(i => {
        const li = document.createElement("li");
        li.innerText = i;
        ul.appendChild(li);
    });
}

/* PROJECT FORMAT FIX */
function formatProjects(text){

    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

    let output = "";

    lines.forEach(line => {

        if(!line.startsWith("-") && !line.startsWith("•")){
            output += "<b>" + line + "</b><br>";
        }
        else{
            output += "• " + line.replace(/^[-•]\s*/, "") + "<br>";
        }
    });

    return output;
}

/* SUBMIT */
document.getElementById('resumeForm').addEventListener('submit', function(e){
    e.preventDefault();

    document.getElementById('resumeName').innerText =
        document.getElementById('name').value;

    document.getElementById('resumeObjective').innerText =
        document.getElementById('objective').value;

    document.getElementById('resumePhone').innerText =
        "Phone: " + document.getElementById('phone').value;

    document.getElementById('resumeEmail').innerText =
        "Email: " + document.getElementById('email').value;

    document.getElementById('resumeLocation').innerText =
        "Location: " + document.getElementById('location').value;

    document.getElementById('resumeLinkedin').innerText =
        "LinkedIn: " + document.getElementById('linkedin').value;

    document.getElementById('resumeExperience').innerText =
        document.getElementById('experience').value;

    makeList('skills','resumeSkills');
    makeList('certifications','resumeCertifications');
    makeList('languages','resumeLanguages');

    document.getElementById('resumeEducation').innerText =
        document.getElementById('education').value;

    document.getElementById('resumeProjects').innerHTML =
        formatProjects(document.getElementById('projects').value);

    document.getElementById('resumeForm').style.display = "none";
    document.getElementById('resume').style.display = "block";
});

</script>

</body>
</html>
